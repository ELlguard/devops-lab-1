name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pytest
      - name: Run tests
        run: pytest

  deploy:
    [cite_start]needs: build  # Запускається тільки після успішних тестів 
    runs-on: ubuntu-latest
    steps:
      - name: Simulate SSH Deployment
        run: |
          echo "Connecting to ${{ secrets.HOST }} as ${{ secrets.USERNAME }}..."
          echo "Updating code from main branch..."
          echo "Restarting Docker containers..."
          echo "Deployment successful!"
