name: Python CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Оновлено до v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Оновлено до v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Якщо файлу немає, цей крок зазвичай і видає помилку
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest # Про всяк випадок ставимо напряму

      - name: Run tests
        run: pytest
